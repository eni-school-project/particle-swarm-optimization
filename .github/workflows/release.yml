name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+*"

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Export with Godot
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz"
          relative_project_path: ./
          presets_to_export: "Windows Desktop, Linux"
          archive_output: true
          cache: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog from commits
        id: generate_changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## What's changed" >> $GITHUB_OUTPUT

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            COMPARE_LINK="Initial release"
          else
            RANGE="$PREV_TAG..HEAD"
            COMPARE_LINK="[\`${{ github.ref_name }}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }})"
          fi

          REPO="${{ github.repository }}"
          FEATURES=$(git log --pretty=format:"* %s|%h" "$RANGE" | grep -i "^* feat:" | sed 's/^* [Ff]eat: //' | sed "s||\(.*\)| ([\`\1\`](https://github.com/${REPO}/commit/\1))|")
          FIXES=$(git log --pretty=format:"* %s|%h" "$RANGE" | grep -i "^* fix:" | sed 's/^* [Ff]ix: //' | sed "s||\(.*\)| ([\`\1\`](https://github.com/${REPO}/commit/\1))|")
          OTHER=$(git log --pretty=format:"* %s|%h" "$RANGE" | grep -iv "^* feat:\|^* fix:" | sed "s||\(.*\)| ([\`\1\`](https://github.com/${REPO}/commit/\1))|")

          if [ -n "$FEATURES" ]; then
            echo "### Features" >> $GITHUB_OUTPUT
            echo "$FEATURES" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
          fi

          if [ -n "$FIXES" ]; then
            echo "### Bug fixes" >> $GITHUB_OUTPUT
            echo "$FIXES" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
          fi

          if [ -n "$OTHER" ]; then
            echo "### Other" >> $GITHUB_OUTPUT
            echo "$OTHER" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
          fi

          echo "" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: $COMPARE_LINK" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prevent bad release names
        run: |
          if [[ "${{ github.ref_name }}" == "master" || "${{ github.ref_name }}" == "main" ]]; then
            echo "Branch name release, so NOPE bro '${{ github.ref_name }}'"
            exit 1
          fi

      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: "pso ${{ github.ref_name }}"
          artifacts: ${{ steps.export.outputs.archive_directory }}/*
          generateReleaseNotes: false
          body: ${{ steps.generate_changelog.outputs.changelog }}
