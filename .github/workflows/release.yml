name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+*"

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Prevent bad release names
        run: |
          if [[ "${{ github.ref_name }}" == "master" || "${{ github.ref_name }}" == "main" ]]; then
            echo "Branch name release, so NOPE bro '${{ github.ref_name }}'"
            exit 1
          fi

      - name: Export with Godot
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz"
          relative_project_path: ./
          presets_to_export: "Windows Desktop, Linux"
          archive_output: true
          cache: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog from commits
        id: generate_changelog
        run: |
          DELIMITER=$(openssl rand -hex 8)
          {
            echo "changelog<<${DELIMITER}"
            echo "## What's changed"
            echo ""

            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -z "$PREV_TAG" ]; then
              RANGE="HEAD"
              COMPARE_LINK="Initial release"
            else
              RANGE="$PREV_TAG..HEAD"
              COMPARE_LINK="[\`${{ github.ref_name }}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }})"
            fi

            LOG_FILE=$(mktemp)
            git log --pretty=format:"%s|%h" "$RANGE" > "$LOG_FILE"

            format_commits() {
              sed -E 's#^(.*)\|([a-f0-9]+)$#- \1 ([`\2`](https://github.com/${{ github.repository }}/commit/\2))#'
            }

            print_section() {
              local title=$1
              local pattern=$2
              local data
              data=$(grep -iE "$pattern" "$LOG_FILE" | sed -E "s/$pattern//i" | format_commits)
              
              if [ -n "$data" ]; then
                echo "### $title"
                echo ""
                echo "$data"
                echo ""
              fi
            }

            print_section "Features" "^feat(ure)?\s*:\s*"
            print_section "Bug Fixes" "^fix(ed)?\s*:\s*"
            print_section "Performance" "^perf\s*:\s*"
            
            OTHER=$(grep -ivE "^(feat(ure)?|fix(ed)?|perf)\s*:\s*" "$LOG_FILE" | format_commits)
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo ""
              echo "$OTHER"
              echo ""
            fi

            echo "---"
            echo ""
            echo "**Full Changelog**: $COMPARE_LINK"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: "pso ${{ github.ref_name }}"
          artifacts: ${{ steps.export.outputs.archive_directory }}/*
          generateReleaseNotes: false
          body: ${{ steps.generate_changelog.outputs.changelog }}
